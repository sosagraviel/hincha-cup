name: CI

on:
  pull_request:
    branches: [main, development]

env:
  NODE_VERSION: "22"
  PNPM_VERSION: "9"

jobs:
  install:
    runs-on: ubuntu-latest
    outputs:
      cache-key: ${{ steps.cache-key.outputs.key }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Get pnpm store directory
        id: pnpm-cache
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path)" >> $GITHUB_OUTPUT

      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: |
            ${{ steps.pnpm-cache.outputs.STORE_PATH }}
            orchestration/node_modules
          key: pnpm-${{ runner.os }}-${{ hashFiles('orchestration/pnpm-lock.yaml') }}
          restore-keys: |
            pnpm-${{ runner.os }}-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        working-directory: orchestration

      - name: Output cache key
        id: cache-key
        run: echo "key=pnpm-${{ runner.os }}-${{ hashFiles('orchestration/pnpm-lock.yaml') }}" >> $GITHUB_OUTPUT

  lint-build:
    runs-on: ubuntu-latest
    needs: install
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Get pnpm store directory
        id: pnpm-cache
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path)" >> $GITHUB_OUTPUT

      - name: Restore pnpm cache
        uses: actions/cache@v4
        with:
          path: |
            ${{ steps.pnpm-cache.outputs.STORE_PATH }}
            orchestration/node_modules
          key: pnpm-${{ runner.os }}-${{ hashFiles('orchestration/pnpm-lock.yaml') }}
          restore-keys: |
            pnpm-${{ runner.os }}-

      - name: Install dependencies (if cache miss)
        run: pnpm install --frozen-lockfile
        working-directory: orchestration

      - name: Lint code
        run: pnpm lint
        working-directory: orchestration

      - name: Check formatting
        run: pnpm format:check
        working-directory: orchestration

      - name: Type check
        run: pnpm typecheck
        working-directory: orchestration

      - name: Build project
        run: pnpm build
        working-directory: orchestration

  test-unit:
    runs-on: ubuntu-latest
    needs: install
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Get pnpm store directory
        id: pnpm-cache
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path)" >> $GITHUB_OUTPUT

      - name: Restore pnpm cache
        uses: actions/cache@v4
        with:
          path: |
            ${{ steps.pnpm-cache.outputs.STORE_PATH }}
            orchestration/node_modules
          key: pnpm-${{ runner.os }}-${{ hashFiles('orchestration/pnpm-lock.yaml') }}
          restore-keys: |
            pnpm-${{ runner.os }}-

      - name: Install dependencies (if cache miss)
        run: pnpm install --frozen-lockfile
        working-directory: orchestration

      - name: Run unit tests
        run: pnpm test:unit
        working-directory: orchestration
