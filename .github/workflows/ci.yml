name: CI

on:
  pull_request:
    branches: [main, development]

env:
  NODE_VERSION: "22"
  PNPM_VERSION: "9"

jobs:
  install:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        working-directory: orchestration

      - name: Cache node_modules
        uses: actions/cache/save@v4
        with:
          path: orchestration/node_modules
          key: deps-${{ hashFiles('orchestration/pnpm-lock.yaml') }}

  lint-build:
    runs-on: ubuntu-latest
    needs: install
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Restore node_modules cache
        uses: actions/cache/restore@v4
        with:
          path: orchestration/node_modules
          key: deps-${{ hashFiles('orchestration/pnpm-lock.yaml') }}
          fail-on-cache-miss: true

      - name: Lint code
        run: pnpm lint
        working-directory: orchestration

      - name: Check formatting
        run: pnpm format:check
        working-directory: orchestration

      - name: Type check
        run: pnpm typecheck
        working-directory: orchestration

      - name: Build project
        run: pnpm build
        working-directory: orchestration

  test-unit:
    runs-on: ubuntu-latest
    needs: install
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Restore node_modules cache
        uses: actions/cache/restore@v4
        with:
          path: orchestration/node_modules
          key: deps-${{ hashFiles('orchestration/pnpm-lock.yaml') }}
          fail-on-cache-miss: true

      - name: Run unit tests
        run: pnpm test:unit
        working-directory: orchestration
