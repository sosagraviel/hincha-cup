services:
  db:
    image: postgres:16.8
    container_name: ${VENDOR_NAME}_db_dev
    restart: always
    shm_size: 128mb
    environment:
      POSTGRES_USER: db_user
      POSTGRES_DB: gira_db
      POSTGRES_PASSWORD: example
      PGDATA: /var/lib/postgresql/data
      TZ: UTC
      PGTZ: UTC
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./services/db:/docker-entrypoint-initdb.d
    ports:
      - 5432:5432
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -d gira_db -U db_user"]
      interval: 1s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: ${VENDOR_NAME}_redis_dev
    restart: always
    ports:
      - 6379:6379
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 1s
      timeout: 5s
      retries: 10

  backend:
    image: ${VENDOR_NAME}/backend:dev
    container_name: ${VENDOR_NAME}_backend_dev
    restart: always
    build:
      context: .
      dockerfile: services/backend/Dockerfile.development
    volumes:
      - ./services/backend/src:/app/services/backend/src
      - ./packages:/app/packages
    ports:
      - 3050:3050
    env_file:
      - .env.development
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    image: ${VENDOR_NAME}/frontend:dev
    container_name: ${VENDOR_NAME}_frontend_dev
    restart: always
    build:
      context: .
      dockerfile: services/web-frontend/Dockerfile.development
    volumes:
      - ./services/web-frontend/src:/app/services/web-frontend/src
      - ./services/web-frontend/public:/app/services/web-frontend/public
      - ./packages:/app/packages
    env_file:
      - .env.development
    ports:
      - 2712:2712
    depends_on:
      - backend
      - keycloak

  keycloak:
    image: quay.io/keycloak/keycloak:26.1.3
    container_name: ${VENDOR_NAME}_keycloak_dev
    restart: always
    environment:
      KC_HOSTNAME: localhost
      KC_HOSTNAME_URL: "http://localhost:${KEYCLOAK_HTTP_PORT}"
      KC_HOSTNAME_ADMIN_URL: "http://localhost:${KEYCLOAK_HTTP_PORT}"
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KC_HEALTH_ENABLED: "true"
      KC_LOG_LEVEL: info
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://db:5432/keycloak
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: keycloak
      KC_DB_SCHEMA: keycloak
      KC_HTTP_MANAGEMENT_PORT: 9000
    volumes:
      - ./services/keycloak/realms:/opt/keycloak/data/import
      - ./services/keycloak/themes:/opt/keycloak/themes
    depends_on:
      db:
        condition: service_healthy
      mailhog:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/localhost/9000 && echo -e 'GET /health/ready HTTP/1.1\\r\\nHost: localhost\\r\\nConnection: close\\r\\n\\r\\n' >&3 && cat <&3 | grep -q '200 OK'"]
      interval: 15s
      timeout: 2s
      retries: 15
      start_period: 30s
    command:
      [
        "start-dev",
        "--http-port",
        "${KEYCLOAK_HTTP_PORT}",
        "--https-port",
        "${KEYCLOAK_HTTPS_PORT}",
      ]
    ports:
      - "${KEYCLOAK_HTTP_PORT}:${KEYCLOAK_HTTP_PORT}"
      - "${KEYCLOAK_HTTPS_PORT}:${KEYCLOAK_HTTPS_PORT}"
      - "9000:9000"

  mailhog:
    image: mailhog/mailhog:latest
    restart: always
    ports:
      - "1025:1025"
      - "8025:8025"

volumes:
  pgdata:
  redisdata:
