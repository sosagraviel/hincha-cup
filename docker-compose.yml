x-app: &app
  image: gritogol-dev
  build:
    context: .
    dockerfile: docker/Dockerfile
  volumes:
    - .:/app
    - node_modules:/app/node_modules
    - functions_node_modules:/app/functions/node_modules

services:
  emulators:
    <<: *app
    command: ["/usr/local/bin/entrypoint-emulators.sh"]
    ports:
      - "4000:4000"
      - "8081:8081"
      - "9099:9099"
      - "9199:9199"
      - "5001:5001"
    environment:
      USE_MOCK_SCORES: "true"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"require('http').get('http://127.0.0.1:4000',r=>process.exit(r.statusCode<500?0:1)).on('error',()=>process.exit(1))\"",
        ]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 90s

  seed:
    <<: *app
    command: ["/usr/local/bin/entrypoint-seed.sh"]
    depends_on:
      emulators:
        condition: service_healthy
    environment:
      FIRESTORE_EMULATOR_HOST: emulators:8081
      VITE_FIREBASE_PROJECT_ID: gritogol
    restart: "no"

  web:
    <<: *app
    command: ["/usr/local/bin/entrypoint-web.sh"]
    depends_on:
      seed:
        condition: service_completed_successfully
    ports:
      - "5173:5173"
    env_file:
      - path: docker/.env.example
        required: true
      - path: docker/.env
        required: false
    environment:
      CHOKIDAR_USEPOLLING: "true"

volumes:
  node_modules:
  functions_node_modules:
