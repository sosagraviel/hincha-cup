# Repo-level Python config — recommendationservice + loadgenerator share it.

[tool.ruff]
line-length = 100
target-version = "py312"

[tool.ruff.lint]
select = ["E", "F", "I", "B", "UP"]

[tool.black]
line-length = 100
target-version = ["py312"]

[tool.pytest.ini_options]
testpaths = ["recommendationservice/tests", "loadgenerator/tests"]
python_files = "test_*.py"
