apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
spec:
  replicas: 2
  selector:
    matchLabels: { app: frontend }
  template:
    metadata:
      labels: { app: frontend }
    spec:
      containers:
        - name: server
          image: frontend:latest
          ports:
            - containerPort: 8080
              name: http
          env:
            - name: PRODUCT_CATALOG_SERVICE_ADDR
              value: productcatalogservice:7000
          readinessProbe:
            httpGet: { path: /healthz, port: 8080 }
            initialDelaySeconds: 5
