apiVersion: apps/v1
kind: Deployment
metadata:
  name: productcatalogservice
spec:
  replicas: 2
  selector:
    matchLabels: { app: productcatalogservice }
  template:
    metadata:
      labels: { app: productcatalogservice }
    spec:
      containers:
        - name: server
          image: productcatalogservice:latest
          ports:
            - containerPort: 7000
              name: grpc
          envFrom:
            - configMapRef:
                name: productcatalogservice-config
          readinessProbe:
            tcpSocket: { port: 7000 }
            initialDelaySeconds: 5
