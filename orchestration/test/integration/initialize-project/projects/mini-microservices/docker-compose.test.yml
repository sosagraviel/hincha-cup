# Integration-test compose — spins up the same services + a Go-based
# checkout-smoke harness that waits for them to be ready and runs e2e.
services:
  redis: { extends: { file: docker-compose.yml, service: redis } }
  frontend: { extends: { file: docker-compose.yml, service: frontend } }
  productcatalogservice: { extends: { file: docker-compose.yml, service: productcatalogservice } }
  cartservice: { extends: { file: docker-compose.yml, service: cartservice } }
  recommendationservice: { extends: { file: docker-compose.yml, service: recommendationservice } }
  paymentservice: { extends: { file: docker-compose.yml, service: paymentservice } }

  e2e:
    build: ./e2e
    depends_on:
      - frontend
      - cartservice
