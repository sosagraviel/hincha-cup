name: CI

on: [push, pull_request]

jobs:
  go:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [frontend, productcatalogservice, e2e]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with: { go-version: '1.22', cache: true, cache-dependency-path: '${{ matrix.service }}/go.sum' }
      - working-directory: ${{ matrix.service }}
        run: go build ./...
      - working-directory: ${{ matrix.service }}
        run: go test ./...

  dotnet:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with: { dotnet-version: 8.0.x }
      - working-directory: cartservice
        run: dotnet test

  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.12' }
      - run: pip install poetry
      - working-directory: recommendationservice
        run: poetry install
      - working-directory: recommendationservice
        run: poetry run pytest

  node:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v3
        with: { version: 9.0.0 }
      - uses: actions/setup-node@v4
        with: { node-version: 22, cache: pnpm, cache-dependency-path: paymentservice/pnpm-lock.yaml }
      - working-directory: paymentservice
        run: pnpm install --frozen-lockfile
      - working-directory: paymentservice
        run: pnpm test
