lockfileVersion: '9.0'

settings:
  autoInstallPeers: true
  excludeLinksFromLockfile: false

importers:
  .:
    devDependencies:
      '@commitlint/cli':
        specifier: ^19.0.0
        version: 19.0.0
      '@playwright/test':
        specifier: ^1.45.0
        version: 1.45.0
      eslint:
        specifier: ^9.0.0
        version: 9.0.0
      husky:
        specifier: ^9.0.0
        version: 9.0.0
      lint-staged:
        specifier: ^15.0.0
        version: 15.0.0
      prettier:
        specifier: ^3.3.0
        version: 3.3.0
      typescript:
        specifier: ^5.5.0
        version: 5.5.0

  services/backend:
    dependencies:
      '@nestjs/common':
        specifier: ^11.0.11
        version: 11.0.11
      '@nestjs/core':
        specifier: ^11.0.11
        version: 11.0.11
      '@nestjs/jwt':
        specifier: ^11.0.0
        version: 11.0.0
      '@nestjs/platform-express':
        specifier: ^11.0.11
        version: 11.0.11
      '@nestjs/typeorm':
        specifier: ^11.0.0
        version: 11.0.0
      typeorm:
        specifier: ^0.3.20
        version: 0.3.20
      bullmq:
        specifier: ^5.0.0
        version: 5.0.0

  services/web-frontend:
    dependencies:
      react:
        specifier: ^18.3.0
        version: 18.3.0
      '@tanstack/react-query':
        specifier: ^5.0.0
        version: 5.0.0
      vite:
        specifier: ^5.4.0
        version: 5.4.0
