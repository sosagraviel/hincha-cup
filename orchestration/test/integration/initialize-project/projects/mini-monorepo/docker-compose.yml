services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: mini_monorepo
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d mini_monorepo"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  keycloak:
    build:
      context: ./services/keycloak
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
      KC_HEALTH_ENABLED: "true"
    ports:
      - "${KEYCLOAK_HTTP_PORT:-7080}:8080"
    command: ["start-dev", "--import-realm"]

  backend:
    build:
      context: ./services/backend
      dockerfile: Dockerfile.development
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://user:password@postgres:5432/mini_monorepo
      REDIS_URL: redis://redis:6379
    ports:
      - "${API_PORT:-3050}:3050"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      keycloak:
        condition: service_started

  web-frontend:
    build:
      context: ./services/web-frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  postgres-data:
