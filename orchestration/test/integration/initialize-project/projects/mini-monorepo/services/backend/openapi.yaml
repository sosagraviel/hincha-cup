openapi: 3.0.3
info:
  title: mini-monorepo backend API
  version: 0.1.0
  description: |
    Minimal OpenAPI spec for the demo backend so the framework's
    API-definition discovery has something to find. One representative
    path; production projects would document the full surface here.

servers:
  - url: http://localhost:3050
    description: Local development

paths:
  /users:
    post:
      summary: Create a user
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateUserDto'
      responses:
        '201':
          description: User created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    CreateUserDto:
      type: object
      required: [email, displayName]
      properties:
        email: { type: string, format: email }
        displayName: { type: string, minLength: 1, maxLength: 80 }
    User:
      allOf:
        - $ref: '#/components/schemas/CreateUserDto'
        - type: object
          properties:
            id: { type: string, format: uuid }
            createdAt: { type: string, format: date-time }
