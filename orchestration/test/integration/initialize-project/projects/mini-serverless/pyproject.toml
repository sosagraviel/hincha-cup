[tool.ruff]
line-length = 100
target-version = "py312"
exclude = [".venv", "__pycache__", ".pytest_cache"]

[tool.ruff.lint]
select = ["E", "F", "I", "B"]
ignore = []

[tool.black]
line-length = 100
target-version = ["py312"]
exclude = "(\\.venv|__pycache__|\\.pytest_cache)/"

[tool.pytest.ini_options]
testpaths = ["functions/python/unit_tests"]
python_files = "test_*.py"
python_classes = "Test*"
python_functions = "test_*"
addopts = "-ra --strict-markers"
