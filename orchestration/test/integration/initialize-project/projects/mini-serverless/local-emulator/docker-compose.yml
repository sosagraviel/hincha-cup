# Local emulator stand-in — matches clasp's local-emulator/docker-compose.yml shape.
services:
  firebase-emulator:
    image: node:22-slim
    working_dir: /workspace
    command: ["npx", "firebase", "emulators:start", "--project=mini-serverless-dev"]
    ports:
      - "4000:4000"   # UI
      - "5001:5001"   # functions
      - "8080:8080"   # firestore
      - "9099:9099"   # auth
      - "9199:9199"   # storage
    volumes:
      - ../firebase:/workspace
