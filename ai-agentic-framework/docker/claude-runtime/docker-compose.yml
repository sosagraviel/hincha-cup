version: '3.9'

# Claude Code Runtime Environment
# Purpose: Run Claude Code in isolated container with codebase mounted
# Version: 1.0.0

services:
  claude-runtime:
    build:
      context: .
      dockerfile: Dockerfile
    image: claude-runtime:1.0.0
    container_name: claude-runtime

    # Mount project codebase as volume
    volumes:
      # Mount the target project (replace /path/to/project with actual path)
      - ${PROJECT_PATH}:/workspace:rw

      # Mount Claude config (if exists globally)
      - ${HOME}/.claude:/root/.claude:ro

      # Mount git config for commits
      - ${HOME}/.gitconfig:/root/.gitconfig:ro

      # Mount SSH keys for git operations
      - ${HOME}/.ssh:/root/.ssh:ro

    # Environment variables (loaded from .env file)
    env_file:
      - .env

    # Additional environment variables
    environment:
      # Claude CLI settings
      - CLAUDE_API_KEY=${CLAUDE_API_KEY}
      - CLAUDE_SKIP_PERMISSIONS=1

      # MCP Server credentials
      - ATLASSIAN_CLOUD_ID=${ATLASSIAN_CLOUD_ID}
      - ATLASSIAN_USER_EMAIL=${ATLASSIAN_USER_EMAIL}
      - ATLASSIAN_API_TOKEN=${ATLASSIAN_API_TOKEN}
      - ATLASSIAN_SITE_URL=${ATLASSIAN_SITE_URL:-https://your-company.atlassian.net}
      - GITHUB_PERSONAL_ACCESS_TOKEN=${GITHUB_PERSONAL_ACCESS_TOKEN}
      - GOOGLE_SHEETS_CREDENTIALS=${GOOGLE_SHEETS_CREDENTIALS}
      - NOTION_API_KEY=${NOTION_API_KEY}

      # Database connections (if needed)
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=${REDIS_URL}

      # Project-specific
      - NODE_ENV=development
      - PNPM_HOME=/usr/local/bin

    # Network mode: host (access localhost services like PostgreSQL, Redis)
    network_mode: host

    # Keep container running
    stdin_open: true
    tty: true

    # Restart policy
    restart: unless-stopped

    # Resource limits (optional, adjust based on needs)
    deploy:
      resources:
        limits:
          cpus: '4'
          memory: 8G
        reservations:
          cpus: '2'
          memory: 4G

# Networks (if not using host mode)
# networks:
#   claude-network:
#     driver: bridge

# Volumes for persistent data (if needed)
volumes:
  claude-cache:
    driver: local
